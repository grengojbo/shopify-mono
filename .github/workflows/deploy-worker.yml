name: Deploy Worker

# Автоматичний деплой Cloudflare Worker'а при змінах коду/конфігурації
# (README → «Автоматичний деплой Worker'а»). Використовує той самий секрет
# CLOUDFLARE_API_TOKEN, що й dry-run у ci.yml (шаблон Edit Cloudflare Workers).
# Перед деплоєм: повний прогін тестів + застосування D1-міграцій на remote.
#
# Передумова: справжній database_id у wrangler.toml (після
# `wrangler d1 create bbox-payments`) — із плейсхолдером деплой упаде.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "migrations/**"
      - "wrangler.toml"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: read

jobs:
  deploy:
    name: wrangler deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Tests (останній бар'єр перед продом)
        run: npm test

      - name: Apply D1 migrations (remote)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 migrations apply bbox-payments --remote

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
