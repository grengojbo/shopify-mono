# Конфігурація Cloudflare Worker (PRD §14).
# Секрети (MONO_TOKEN, SHOPIFY_ADMIN_TOKEN, ...) — лише через `wrangler secret put`,
# ніколи не в цьому файлі.

name = "bbox-mono-payments"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "bbox_payments"
database_name = "bbox-payments"
# Плейсхолдер: замінити реальним id після `wrangler d1 create bbox-payments`.
database_id = "a38e0591-55b2-4732-a6da-8c47a9377a8f"

[triggers]
crons = ["*/15 * * * *"]

# Власний домен замість *.workers.dev (zone bbox.kiev.ua вже в Cloudflare).
# custom_domain = true — wrangler сам створює DNS-запис при деплої.
[[routes]]
pattern = "pay.bbox.kiev.ua"
custom_domain = true
